name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        run: npm run build

  backend-quality-gates:
    name: Backend Pytest + Permission Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      COMPOSE_FILE: infra/docker-compose.yml
      COMPOSE_ENV_FILE: .env
      API_BASE_URL: http://127.0.0.1:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare local env file
        run: |
          cp .env.example .env
          # Force CI to stay fully local/offline for model dependencies.
          {
            echo "EMBEDDING_MODE=mock"
            echo "LLM_MODE=mock"
            echo "LOCAL_ROUTER_MODE=rules"
          } >> .env

      - name: Start compose services for backend validation
        run: docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" up -d --build postgres redis neo4j api

      - name: Initial compose diagnostics
        run: |
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" ps -a
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color --tail 120 api || true
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color --tail 80 postgres || true
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color --tail 80 redis || true
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color --tail 80 neo4j || true

      - name: Wait for API healthz
        shell: bash
        run: |
          for i in {1..90}; do
            if curl -fsS "${API_BASE_URL}/healthz" > /dev/null; then
              echo "API health check passed."
              exit 0
            fi
            echo "[attempt ${i}/90] healthz not ready yet."
            docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color --tail 50 api || true
            sleep 2
          done
          echo "API health check timed out."
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" ps -a || true
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color api || true
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color postgres || true
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color redis || true
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color neo4j || true
          exit 1

      - name: Verify API runtime stays mock in CI
        run: |
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" exec -T api python -c "from app.core.config import get_settings; s=get_settings(); print(f'EMBEDDING_MODE={s.embedding_mode} LLM_MODE={s.llm_mode} LOCAL_ROUTER_MODE={s.local_router_mode}'); assert s.embedding_mode == 'mock'; assert s.llm_mode == 'mock'"

      - name: Backend pytest
        run: docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" exec -T api python -m pytest -q

      - name: Permission-aware access matrix
        run: python scripts/test_permission_matrix.py --base-url "$API_BASE_URL"

      - name: Compose logs on failure
        if: failure()
        run: |
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" ps -a
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color api
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color postgres
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color redis
          docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" logs --no-color neo4j

      - name: Tear down compose services
        if: always()
        run: docker compose -f "$COMPOSE_FILE" --env-file "$COMPOSE_ENV_FILE" down -v
