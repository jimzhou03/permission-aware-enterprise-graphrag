name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Build frontend
        run: npm run build

  backend-quality-gates:
    name: Backend Pytest + Permission Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prepare local env file
        run: cp .env.example .env

      - name: Start compose services for backend validation
        working-directory: infra
        run: docker compose up -d --build postgres redis neo4j api

      - name: Wait for API healthz
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8000/healthz > /dev/null; then
              echo "API health check passed."
              exit 0
            fi
            sleep 2
          done
          echo "API health check timed out."
          exit 1

      - name: Backend pytest
        working-directory: infra
        run: docker compose exec -T api python -m pytest -q

      - name: Permission-aware access matrix
        run: python scripts/test_permission_matrix.py --base-url http://127.0.0.1:8000

      - name: Compose logs on failure
        if: failure()
        working-directory: infra
        run: docker compose logs --no-color api postgres redis neo4j

      - name: Tear down compose services
        if: always()
        working-directory: infra
        run: docker compose down -v
