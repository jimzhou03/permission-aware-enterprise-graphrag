services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: paegr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: graphrag
      POSTGRES_USER: graphrag
      POSTGRES_PASSWORD: graphrag
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graphrag -d graphrag"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: paegr-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: paegr-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/password12345
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    container_name: paegr-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://graphrag:graphrag@postgres:5432/graphrag
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password12345
      JWT_SECRET_KEY: change-me-in-docker-compose
      SEED_ON_STARTUP: "true"
      SYNC_NEO4J_ON_STARTUP: "true"
      UVICORN_RELOAD: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: http://127.0.0.1:8000/api/v1
    container_name: paegr-web
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_started

volumes:
  pg_data:
  redis_data:
  neo4j_data:

